server {
    listen 80;
    server_name _;

    # Usa o DNS interno do Docker para resolver nomes de servico dinamicamente.
    # Evita Gateway Timeout quando o frontend sobe antes do backend.
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso para o backend (API)
    location /db/ {
        set $upstream http://backend:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /auth/ {
        set $upstream http://backend:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /report/ {
        set $upstream http://backend:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /push/ {
        set $upstream http://backend:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue Router (History Mode) - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acesso a arquivos ocultos
    location ~ /\. {
        deny all;
    }
}
